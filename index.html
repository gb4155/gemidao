<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpresa!</title>
    <style>
        /* Define que o corpo da página ocupa 100% da tela */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Evita barras de rolagem */
        }

        /* O novo "botão" gigante que ocupa tudo */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #222; /* Fundo escuro */
            cursor: pointer; /* Mostra a mãozinha de clique */
        }

        /* Um texto sutil no meio para a pessoa saber que deve clicar */
        .instrucao {
            color: #555; /* Texto cinza escuro para ficar discreto */
            font-family: sans-serif;
            font-size: 20px;
            user-select: none; /* Impede que a pessoa selecione o texto */
        }
    </style>
</head>
<!-- Aqui está o pulo do gato: o onclick="tocarGemidao()" foi para o body! -->
<body onclick="tocarGemidao()">

    <!-- Texto opcional no meio -->
    <div class="instrucao">Toque na tela para carregar</div>

    <!-- O seu arquivo de áudio exatamente como estava -->
    <audio id="audio-zap" src="gemidane-do-zap.mp3" preload="auto"></audio>

    <script>
        function tocarGemidao() {
            var som = document.getElementById("audio-zap");
            
            // Reinicia o áudio se ele já tiver sido tocado
            som.currentTime = 0; 
            
            // Tenta tocar o som
            som.play().catch(function(error) {
                // Navegadores às vezes bloqueiam o play direto,
                // mas como o clique foi no body, deve funcionar.
                console.log("Erro ao tocar áudio: ", error);
            });
            
            // Opcional: remover o clique do body após o primeiro toque
            // para não ficar reiniciando o som toda vez que clicar.
            document.body.removeAttribute("onclick");
        }
    </script>
</body>
</html>
